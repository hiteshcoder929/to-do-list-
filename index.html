<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" id="lightcss">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>to-do list</title>
</head>

<body>
    <!-- slider -->
    <div class="vir-bar"></div>
    <div class="slider">
        <div class="content cont">
            <div class="set-logo">
                <h1>settings <i class="fa-solid fa-gear"></i></h1>
            </div>
            <div class="theme">
                <div class="change-bg">
                    change background:- <i class="fa-solid fa-upload"></i>
                </div>
                <div class="mode">
                    Mode:-
                    <div class="dark">
                        <button class="btn seprate">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </div>
                    <div class="light">
                        <button class="btn seprate">
                            <i class="fa-regular fa-lightbulb"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="my-work">
                <h1>my work</h1>
                <div class="link">
                    <i class="fa-solid fa-crosshairs"></i>claculator
                </div>
                <div class="link">
                    <i class="fa-solid fa-crosshairs"></i>clone
                </div>
                <div class="link">
                    <i class="fa-solid fa-crosshairs"></i>flip card
                </div>
            </div>
            <div class="contact">
                <h1>contacts</h1>
                <div class="link">
                    <i class="fa-brands fa-ethereum"></i>instagram
                </div>
                <div class="link">
                    <i class="fa-brands fa-ethereum"></i>telegram
                </div>
                <div class="link">
                    <i class="fa-brands fa-ethereum"></i>facebook
                </div>
            </div>
        </div>
    </div>

    <!-- mainbody -->


    <div class="container">
        <!-- header -->
        <div class="head">
            <div class="head-top">
                <div class="title">
                    <h1>To-Do List</h1>
                </div>
                <div class="slide-bar">
                    <i class="fa-solid fa-gear"></i>
                </div>
            </div>
        </div>

        <!-- main body -->
        <div class="section">
            <div class="a1">
                <form class="task-input">
                    <input type="text" id="input" placeholder="write your task">
                    <button type="submit" class="submit"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>
            <div class="task-list">
                <div class="task" id="hidden">
                    <div class="left">
                        <input type="checkbox" class="checkbox">
                        <p class="text">task</p>
                    </div>
                    <div class="right">
                        <div class="delete">
                            <i class="fa-solid fa-trash"></i>
                        </div>
                        <div class="edit">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
